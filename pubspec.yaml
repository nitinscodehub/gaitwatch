name: gaitwatch
description: "Gait Analysis for Early Parkinson's Detection - A health-tech mobile application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.5
  sensors_plus: ^6.1.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  pdf: ^3.11.3
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#0F62FE"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/
